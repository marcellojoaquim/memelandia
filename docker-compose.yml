services:
  mongodb:
    image: mongo:latest
    container_name: mongo-memelandia
    restart: always 
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: adm
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: memelandia
  postgresdb:
    image: postgres:15-alpine
    container_name: postgres-memelandia
    restart: always 
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: usuario-memelandia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  redis:
    image: redis:latest
    container_name: memelandia-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-memelandia
    ports:
      - "9411:9411"
    networks:
      - memelandia-network
networks:
  memelandia-network:
    driver: bridge