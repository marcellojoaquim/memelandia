spring:
  application:
    name: auth-server
  config:
    import: configserver:http://localhost:8888
  security:
    user:
      name: user
      password: password
    oauth2:
      authorizationserver:
        client:
          oidc-client:
            registration:
              client-id: "oidc-client"
              client-secret: "{noop}secret"
              client-authentication-methods:
                - "client_secret_basic"
              authorization-grant-types:
                - "authorization_code"
                - "refresh_token"
              redirect-uris:
                - "http://localhost:8081/login/oauth2/code/oidc-client"
              post-logout-redirect-uris:
                - "http://localhost:8081/"
              scopes:
                - "openid"
                - "profile"
            require-authorization-consent: false